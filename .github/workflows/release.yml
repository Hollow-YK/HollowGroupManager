name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version info
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

          # 预发布判定
          if [[ "$VERSION" =~ alpha|beta|rc|dev|preview ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract update log from history.txt
        run: |
          VERSION="V${{ steps.meta.outputs.version }}"

          awk -v ver="${VERSION}" '
            $0 ~ "^" ver "[ (]" { found=1; next }
            found && /^V[0-9]/       { exit }
            found && /^---/          { next }
            found                    { sub(/^▸ /, "- "); print }
          ' history.txt > /tmp/update_log.md

          echo "Extracted update log:"
          cat /tmp/update_log.md || echo "(empty)"

      - name: Generate changelog with git-cliff
        id: changelog
        run: |
          # 安装 git-cliff
          curl -sSfL \
            "https://github.com/orhun/git-cliff/releases/download/v2.9.0/git-cliff-2.9.0-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz
          sudo install git-cliff-*/git-cliff /usr/local/bin/

          # 确定前一个 tag
          PREV_TAG=$(git tag --sort=-v:refname | sed -n "/^${{ github.ref_name }}$/{n;p}")

          # 生成 changelog
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${{ github.ref_name }}"
          else
            RANGE=""
          fi

          git-cliff \
            --github-repo "${{ github.repository }}" \
            --github-token "${{ secrets.GITHUB_TOKEN }}" \
            --log-option "--first-parent" \
            --strip header \
            --output /tmp/changelog.md \
            $RANGE || echo "cliff_failed=true" >> "$GITHUB_OUTPUT"

          echo "Generated changelog:"
          cat /tmp/changelog.md || echo "(empty)"

      - name: Compose final release body
        run: |
          {
            # 更新日志 (history.txt) + 分类 PR changelog (git-cliff)
            # PRIMARY: history.txt 提取的更新日志
            if [ -s /tmp/update_log.md ]; then
              echo "## 更新日志"
              echo ""
              cat /tmp/update_log.md
              echo ""
              echo "---"
              echo ""
            fi

            # git-cliff 生成的分类 PR changelog
            if [ -s /tmp/changelog.md ]; then
              cat /tmp/changelog.md
            else
              # FALLBACK: git-cliff 失败时回退到 git log
              PREV_TAG=$(git tag --sort=-v:refname | sed -n "/^${{ github.ref_name }}$/{n;p}")
              echo "## ${{ steps.meta.outputs.version }} ($(date +%Y-%m-%d))"
              echo ""
              if [ -n "$PREV_TAG" ]; then
                git log "${PREV_TAG}..HEAD" --format="- %s" --no-merges
              else
                git log --format="- %s" --no-merges
              fi
            fi
          } > /tmp/release_body.md

          echo "Final release body:"
          cat /tmp/release_body.md

      - name: Create release archive
        run: |
          mkdir -p dist/多群管理Bot
          cp main.java       dist/多群管理Bot/
          cp info.prop       dist/多群管理Bot/
          cp README.md       dist/多群管理Bot/
          cp desc.txt        dist/多群管理Bot/
          cp config.properties dist/多群管理Bot/
          cd dist
          zip -r "../HollowGroupManager_QF-${{ steps.meta.outputs.version }}.zip" 多群管理Bot

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: V${{ steps.meta.outputs.version }}
          body_path: /tmp/release_body.md
          files: HollowGroupManager_QF-${{ steps.meta.outputs.version }}.zip
          prerelease: ${{ steps.meta.outputs.prerelease }}
