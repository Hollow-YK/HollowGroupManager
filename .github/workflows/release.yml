name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  # 版本目录列表（硬编码），Extract update logs 会遍历这些目录
  EDITIONS: 'QFun OneBot11'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version info
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

          # 预发布判定
          if [[ "$VERSION" =~ alpha|beta|rc|dev|preview ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract update logs from history.txt
        run: |
          VERSION="V${{ steps.meta.outputs.version }}"
          > /tmp/update_log.md

          for edition in $EDITIONS; do
            if [ -f "${edition}/history.txt" ]; then
              echo "## ${edition} 更新日志" >> /tmp/update_log.md
              echo "" >> /tmp/update_log.md

              awk -v ver="${VERSION}" '
                $0 ~ "^" ver "[ (]" { found=1; next }
                found && /^V[0-9]/       { exit }
                found && /^---/          { next }
                found                    { sub(/^▸ /, "- "); print }
              ' "${edition}/history.txt" >> /tmp/update_log.md

              echo "" >> /tmp/update_log.md
            fi
          done

          echo "Extracted update log:"
          cat /tmp/update_log.md || echo "(empty)"

      - name: Generate changelog with git-cliff
        id: changelog
        run: |
          # 安装 git-cliff
          curl -sSfL \
            "https://github.com/orhun/git-cliff/releases/download/v2.9.0/git-cliff-2.9.0-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz
          sudo install git-cliff-*/git-cliff /usr/local/bin/

          # 确定前一个 tag
          PREV_TAG=$(git tag --sort=-v:refname | sed -n "/^${{ github.ref_name }}$/{n;p}")

          # 生成 changelog
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${{ github.ref_name }}"
          else
            RANGE=""
          fi

          git-cliff \
            --config .github/cliff.toml \
            --github-repo "${{ github.repository }}" \
            --github-token "${{ secrets.GITHUB_TOKEN }}" \
            --log-option "--first-parent" \
            --strip header \
            --output /tmp/changelog.md \
            $RANGE || echo "cliff_failed=true" >> "$GITHUB_OUTPUT"

          echo "Generated changelog:"
          cat /tmp/changelog.md || echo "(empty)"

      - name: Compose final release body
        run: |
          {
            HAS_UPDATE_LOG=false

            # PRIMARY: history.txt 提取的更新日志
            if [ -s /tmp/update_log.md ]; then
              HAS_UPDATE_LOG=true
              echo "## 更新日志"
              echo ""
              cat /tmp/update_log.md
              echo ""
              echo "---"
              echo ""
            fi

            # git-cliff / fallback — 有 update_log 时折叠到 <details> 里
            if $HAS_UPDATE_LOG; then
              echo '<details>'
              echo '<summary>📋 提交记录</summary>'
              echo ""
            fi

            if [ -s /tmp/changelog.md ]; then
              cat /tmp/changelog.md
            else
              # FALLBACK: git-cliff 失败时回退到 git log
              PREV_TAG=$(git tag --sort=-v:refname | sed -n "/^${{ github.ref_name }}$/{n;p}")
              echo "## ${{ steps.meta.outputs.version }} ($(date +%Y-%m-%d))"
              echo ""
              if [ -n "$PREV_TAG" ]; then
                git log "${PREV_TAG}..HEAD" --format="- %s" --no-merges
              else
                git log --format="- %s" --no-merges
              fi
            fi

            if $HAS_UPDATE_LOG; then
              echo ""
              echo '</details>'
            fi
          } > /tmp/release_body.md

          echo "Final release body:"
          cat /tmp/release_body.md

      - name: Create QFun release archive
        run: |
          mkdir -p dist/多群管理Bot
          cp QFun/main.java       dist/多群管理Bot/
          cp QFun/info.prop       dist/多群管理Bot/
          cp QFun/README.md       dist/多群管理Bot/
          cp QFun/desc.txt        dist/多群管理Bot/
          cp QFun/config.properties dist/多群管理Bot/
          cd dist
          zip -r "../HollowGroupManager_QFun-${{ steps.meta.outputs.version }}.zip" 多群管理Bot

      - name: Create OneBot11 release archive
        run: |
          mkdir -p dist/HollowGroupManager
          cp OneBot11/main.py           dist/HollowGroupManager/
          cp OneBot11/requirements.txt  dist/HollowGroupManager/
          cp OneBot11/README.md         dist/HollowGroupManager/
          cp OneBot11/LICENSE           dist/HollowGroupManager/
          cp -r OneBot11/bot            dist/HollowGroupManager/
          cp -r OneBot11/core           dist/HollowGroupManager/
          cp -r OneBot11/features       dist/HollowGroupManager/
          cp -r OneBot11/tools          dist/HollowGroupManager/
          find dist/HollowGroupManager -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
          cd dist
          zip -r "../HollowGroupManager_OneBot11-${{ steps.meta.outputs.version }}.zip" HollowGroupManager

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: V${{ steps.meta.outputs.version }}
          body_path: /tmp/release_body.md
          files: |
            HollowGroupManager_QFun-${{ steps.meta.outputs.version }}.zip
            HollowGroupManager_OneBot11-${{ steps.meta.outputs.version }}.zip
          prerelease: ${{ steps.meta.outputs.prerelease }}
