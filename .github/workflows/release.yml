name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version info
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

          # 预发布判定
          if [[ "$VERSION" =~ alpha|beta|rc|dev|preview ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract update log from history.txt
        run: |
          VERSION="V${{ steps.meta.outputs.version }}"

          awk -v ver="${VERSION}" '
            $0 ~ "^" ver "[ (]" { found=1; next }
            found && /^V[0-9]/       { exit }
            found && /^---/          { next }
            found                    { sub(/^▸ /, "- "); print }
          ' history.txt > /tmp/update_log.md

          echo "Extracted update log:"
          cat /tmp/update_log.md || echo "(empty)"

      - name: Generate GitHub-style release notes
        id: release_notes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | sed -n "/^v${{ steps.meta.outputs.version }}$/{n;p}")

          if [ -n "$PREV_TAG" ]; then
            PREV_TAG_PARAM="previous_tag_name=$PREV_TAG"
          else
            PREV_TAG_PARAM=""
          fi

          # 调用 GitHub API 生成 release notes（与 GitHub 自动生成一致）
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/generate-notes" \
            -d "{\"tag_name\": \"${{ github.ref_name }}\", \"target_commitish\": \"main\", ${PREV_TAG_PARAM:+\"$PREV_TAG_PARAM\",} \"configuration_file_path\": \".github/release.yml\"}")

          echo "$RESPONSE" > /tmp/api_response.json
          BODY=$(echo "$RESPONSE" | jq -r '.body // empty')

          if [ -z "$BODY" ] || [ "$BODY" = "null" ]; then
            echo "GitHub API failed, falling back to git log"
            # Fallback: 手动生成变更列表
            echo "## What's Changed" > /tmp/generated_notes.md
            echo "" >> /tmp/generated_notes.md
            if [ -n "$PREV_TAG" ]; then
              git log "${PREV_TAG}..HEAD" --format="- %s" --no-merges >> /tmp/generated_notes.md
            else
              git log --format="- %s" --no-merges >> /tmp/generated_notes.md
            fi

            echo "" >> /tmp/generated_notes.md
            echo "## New Contributors" >> /tmp/generated_notes.md
            echo "" >> /tmp/generated_notes.md

            if [ -n "$PREV_TAG" ]; then
              git log "${PREV_TAG}..HEAD" --format="%an" --no-merges | sort -u | sed 's/^/- @/' >> /tmp/generated_notes.md
            else
              git log --format="%an" --no-merges | sort -u | sed 's/^/- @/' >> /tmp/generated_notes.md
            fi
          else
            echo "$BODY" > /tmp/generated_notes.md
          fi

          echo "Generated release notes:"
          cat /tmp/generated_notes.md

      - name: Compose final release body
        run: |
          # 更新日志 + GitHub 风格 release notes
          {
            if [ -s /tmp/update_log.md ]; then
              echo "## 更新日志"
              echo ""
              cat /tmp/update_log.md
              echo ""
              echo "---"
              echo ""
            fi
            cat /tmp/generated_notes.md
          } > /tmp/release_body.md

          echo "Final release body:"
          cat /tmp/release_body.md

      - name: Create release archive
        run: |
          mkdir -p dist/多群管理Bot
          cp main.java       dist/多群管理Bot/
          cp info.prop       dist/多群管理Bot/
          cp README.md       dist/多群管理Bot/
          cp desc.txt        dist/多群管理Bot/
          cp config.properties dist/多群管理Bot/
          cd dist
          zip -r "../HollowGroupManager_QF-${{ steps.meta.outputs.version }}.zip" 多群管理Bot

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: V${{ steps.meta.outputs.version }}
          body_path: /tmp/release_body.md
          files: HollowGroupManager_QF-${{ steps.meta.outputs.version }}.zip
          prerelease: ${{ steps.meta.outputs.prerelease }}
